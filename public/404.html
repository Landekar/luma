<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coalesce</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts path-based URL to hash-based URL and redirects to index.html
      var path = window.location.pathname
        .replace('/coalesce', '')  // remove base path
        .replace(/^\//, '')    // remove leading slash
      if (path) {
        window.location.replace(
          window.location.origin + '/coalesce/#/' + path +
          (window.location.search || '')
        )
      } else {
        window.location.replace(window.location.origin + '/coalesce/')
      }
    </script>
  </head>
  <body></body>
</html>
